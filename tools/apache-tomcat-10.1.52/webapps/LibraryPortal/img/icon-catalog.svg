<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g fill="#000">
    <!-- Back page -->
    <rect x="30" y="8" width="55" height="72" rx="3" opacity="0.5" transform="rotate(8, 57, 44)"/>
    <!-- Middle page -->
    <rect x="25" y="10" width="55" height="72" rx="3" opacity="0.7" transform="rotate(4, 52, 46)"/>
    <!-- Front page -->
    <rect x="18" y="12" width="55" height="72" rx="3"/>
  </g>
  <!-- Border frame on front page -->
  <rect x="25" y="22" width="41" height="35" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Text lines -->
  <rect x="28" y="30" width="35" height="3" rx="1" fill="white"/>
  <rect x="28" y="38" width="35" height="3" rx="1" fill="white"/>
  <rect x="28" y="46" width="25" height="3" rx="1" fill="white"/>
</svg>
